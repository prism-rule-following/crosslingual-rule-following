# Translation pipeline config — one block per target language.
# English is the source, no entry needed. Add a language by appending a block
# and running `python -m pipeline.translate --lang <code>`.
#
# Backends supported:
#   - azure         : Azure AI Foundry deployment via the OpenAI-compatible v1 endpoint.
#                     The `model` field is your Foundry DEPLOYMENT NAME (not the base
#                     model name). Requires AZURE_FOUNDRY_API_KEY and
#                     AZURE_FOUNDRY_ENDPOINT (must end in /openai/v1) in .env.
#   - huggingface   : local HF model. `model_type: seq2seq` (NLLB/IndicTrans2) or
#                     `causal_lm` (Gemma-style LLMs, currently unused).
#
# PLACEHOLDER ALERT — every `model: <AZURE_DEPLOYMENT_NAME>` below is a placeholder.
# Replace with the deployment name(s) from your Azure Foundry project. If you deploy
# one model (e.g., `translator-gpt4o-mini`), you can find/replace <AZURE_DEPLOYMENT_NAME>
# with that single value. If you deploy different models per language, edit per-block.
#
# Per-language fields:
#   name, script                — display metadata
#   translator / backtranslator — nested blocks for forward (en→lang) and reverse (lang→en)
#     model                     — Azure deployment name OR HF model ID
#     backend                   — "azure" | "huggingface"
#     backend_mode              — "local"  (huggingface only)
#     model_type                — "seq2seq" | "causal_lm"  (huggingface only)
#     src_lang / tgt_lang       — Flores-200 codes (huggingface seq2seq only)
#   quality_metric              — "comet_kiwi" | "africomet"
#   quality_threshold           — float, or null to auto-calibrate on first 20 pairs
#   active_cancelled_words      — one-token pair; must preserve one-word diff after translation

# ----- High-resource languages: Azure LLM for both directions ------------------

de:
  name: German
  script: Latin
  translator:
    model: gpt-5.4-mini
    backend: azure
  backtranslator:
    model: gpt-5.4-mini
    backend: azure
  quality_metric: comet_kiwi
  quality_threshold: null
  active_cancelled_words:
    active: aktiv
    cancelled: storniert

